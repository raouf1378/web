name: Web Downloader

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: '🔗 Website URL to archive'
        required: true
        type: string
      output_name:
        description: '📝 Output file name (without extension)'
        required: true
        default: 'website_archive'
        type: string
      use_warp:
        description: '🛡️ Use WARP (sometimes helps | +40s)'
        required: true
        default: false
        type: boolean
      parts_size:
        description: '🫙 Parts size (MB)'
        required: false
        type: string
        default: '45'

jobs:
  archive-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Prepare web branch
        run: |
          set -e
          git fetch origin || true

          if git ls-remote --exit-code --heads origin web >/dev/null 2>&1; then
            git checkout web
            git pull origin web
          else
            git checkout --orphan web
            git rm -rf . || true
            mkdir -p web
            touch web/.gitkeep
            git add web/.gitkeep
            git commit --allow-empty -m "[bot] Initialize web branch"
            git push --set-upstream origin web
          fi

      - name: Setup ArchiveBox Docker
        run: |
          docker pull archivebox/archivebox:latest

      - name: Setup WARP network
        if: ${{ inputs.use_warp }}
        run: |
          docker rm -f warp 2>/dev/null || true
          docker network rm warp-net 2>/dev/null || true
          docker network create warp-net

      - name: Start WARP
        if: ${{ inputs.use_warp }}
        run: |
          set -e
          docker volume create warp-data

          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          echo "Waiting for WARP to initialize..."

          WARP_READY=false
          RESULT=""

          for i in {1..10}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://1.1.1.1/cdn-cgi/trace 2>/dev/null || true)

            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP proxy is ready! (Took $i attempts)"
              echo "$RESULT" | grep -E "^(ip|warp|colo)=" || true
              WARP_READY=true
              break
            fi

            echo "Attempt $i/10 - WARP not ready, waiting 3s..."
            sleep 3
          done

          if [ "$WARP_READY" = false ]; then
            echo "WARP failed to activate fully, continuing anyway..."
            echo "Last response: $RESULT"
          fi

      - name: Archive Website
        id: archive
        run: |
          set -e

          mkdir -p archive_data web
          chmod 777 archive_data web

          PROXY_ARGS=""
          if [ "${{ inputs.use_warp }}" = "true" ]; then
            echo "Using WARP network for ArchiveBox..."
            PROXY_ARGS="--network warp-net"
          fi

          echo "Initializing ArchiveBox..."
          docker run --rm $PROXY_ARGS \
            -v "$PWD/archive_data:/data" \
            archivebox/archivebox init --setup

          echo "Adding URL to ArchiveBox..."
          docker run --rm $PROXY_ARGS \
            -v "$PWD/archive_data:/data" \
            archivebox/archivebox add "${{ inputs.website_url }}"

          OUTPUT_NAME="${{ inputs.output_name }}"
          PART_SIZE="${{ inputs.parts_size }}"

          echo "Creating split zip archive..."
          cd web
          zip -0 -r -s "${PART_SIZE}m" "${OUTPUT_NAME}.zip" ../archive_data

          echo "FILE_NAME=$OUTPUT_NAME" >> $GITHUB_ENV

      - name: Stop WARP
        if: ${{ inputs.use_warp }}
        run: |
          docker stop warp || true

      - name: Generate README with Download Links
        run: |
          set -e
          rm -f README.md

          {
            echo "# 📥 Archive Download Links"
            echo "Generated on: $(date)"
            echo ""
            echo "## Files"
            echo ""
          } > README.md

          shopt -s nullglob
          for file in web/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              url="https://github.com/${{ github.repository }}/raw/web/web/${filename}"
              echo "- [Download ${filename}](${url})" >> README.md
            fi
          done

      - name: Commit
        run: |
          set -e
          git add README.md web

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "[bot] Add website archive ${{ env.FILE_NAME }}"
          git push
